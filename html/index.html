<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Chakra Petch',sans-serif;}
  html,body{width:100%;height:100%;overflow:hidden;}
  #wrap{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;}
  #wrap.on{display:flex;}
  .holder{position:relative;margin-bottom:8vh;display:flex;flex-direction:column;align-items:center;gap:10px;
    animation:pop .25s cubic-bezier(.22,1,.36,1) both;}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.92)}to{opacity:1;transform:none}}

  /* ---- la fiole ---- */
  .flask{position:relative;width:86px;height:150px;}
  /* bouchon */
  .cork{position:absolute;left:50%;top:-2px;transform:translateX(-50%);width:26px;height:16px;border-radius:4px 4px 2px 2px;
    background:linear-gradient(180deg,#6b4a2a,#3e2a16);box-shadow:0 2px 4px rgba(0,0,0,.5);z-index:4;}
  /* col */
  .neck{position:absolute;left:50%;top:12px;transform:translateX(-50%);width:24px;height:30px;
    background:linear-gradient(90deg,rgba(255,255,255,.10),rgba(255,255,255,.02));border:2px solid rgba(180,220,160,.35);border-bottom:none;z-index:3;}
  /* corps en verre */
  .body{position:absolute;left:50%;top:38px;transform:translateX(-50%);width:82px;height:108px;overflow:hidden;
    border:2px solid rgba(180,220,160,.4);border-radius:14px 14px 42px 42px;
    background:linear-gradient(90deg,rgba(255,255,255,.10),rgba(255,255,255,.02) 40%,rgba(255,255,255,.0));
    box-shadow:0 0 26px rgba(139,240,74,.18), inset 0 0 18px rgba(0,0,0,.35);}
  /* reflet vertical */
  .body::after{content:"";position:absolute;left:12px;top:8px;width:9px;height:78px;border-radius:8px;background:rgba(255,255,255,.18);}

  /* liquide */
  .liquid{position:absolute;left:0;bottom:0;width:100%;height:8%;
    background:linear-gradient(180deg,#a6ff5e,#5fbf2f 60%,#3c8a1f);
    box-shadow:0 0 18px rgba(139,240,74,.5) inset;transition:height linear;}
  /* surface ondulante */
  .liquid::before{content:"";position:absolute;left:-25%;top:-9px;width:150%;height:18px;border-radius:45%;
    background:#b6ff6e;opacity:.9;animation:wave 1.6s linear infinite;}
  @keyframes wave{0%{transform:translateX(0) rotate(0)}50%{transform:translateX(-12px) rotate(3deg)}100%{transform:translateX(0) rotate(0)}}

  /* bulles */
  .bub{position:absolute;bottom:6px;border-radius:50%;background:rgba(220,255,190,.85);box-shadow:0 0 6px rgba(190,255,140,.7);}
  .b1{left:22%;width:7px;height:7px;animation:rise 2.2s ease-in infinite;}
  .b2{left:46%;width:5px;height:5px;animation:rise 1.7s ease-in .4s infinite;}
  .b3{left:64%;width:9px;height:9px;animation:rise 2.6s ease-in .9s infinite;}
  .b4{left:35%;width:4px;height:4px;animation:rise 1.4s ease-in 1.1s infinite;}
  .b5{left:74%;width:6px;height:6px;animation:rise 2.0s ease-in .2s infinite;}
  @keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}15%{opacity:.9}100%{transform:translateY(-96px) scale(1.1);opacity:0}}

  /* halo */
  .glow{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);width:130px;height:130px;border-radius:50%;
    background:radial-gradient(circle,rgba(139,240,74,.22),transparent 70%);z-index:-1;animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{50%{opacity:.55}}

  .lbl{font-weight:700;font-size:13px;letter-spacing:2px;color:#d7ffc0;text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.8);}
  .pct{font-weight:700;font-size:11px;letter-spacing:1px;color:#9fe06a;text-shadow:0 1px 4px rgba(0,0,0,.8);}
</style>
</head>
<body>
  <div id="wrap">
    <div class="holder">
      <div class="flask">
        <div class="glow"></div>
        <div class="body">
          <div class="liquid" id="liquid">
            <span class="bub b1"></span><span class="bub b2"></span><span class="bub b3"></span>
            <span class="bub b4"></span><span class="bub b5"></span>
          </div>
        </div>
        <div class="neck"></div>
        <div class="cork"></div>
      </div>
      <div class="lbl" id="lbl">Fouille…</div>
      <div class="pct" id="pct">0%</div>
    </div>
  </div>

<script>
  const $=function(id){return document.getElementById(id);};
  let raf=null, start=0, dur=6000;
  function tick(){
    const e=Math.min(1,(performance.now()-start)/dur);
    $('pct').textContent=Math.floor(e*100)+'%';
    if(e<1) raf=requestAnimationFrame(tick);
  }
  window.addEventListener('message',function(ev){
    const d=ev.data||{};
    if(d.action==='potionShow'){
      dur=d.duration||6000;
      $('lbl').textContent=d.label||'Fouille…';
      const liq=$('liquid');
      liq.style.transition='none'; liq.style.height='8%';
      $('wrap').classList.add('on');
      void liq.offsetWidth;
      liq.style.transition='height '+dur+'ms linear';
      liq.style.height='100%';
      $('pct').textContent='0%';
      if(raf)cancelAnimationFrame(raf); start=performance.now(); raf=requestAnimationFrame(tick);
    } else if(d.action==='potionHide'){
      $('wrap').classList.remove('on');
      if(raf){cancelAnimationFrame(raf);raf=null;}
    }
  });
</script>
</body>
</html>
